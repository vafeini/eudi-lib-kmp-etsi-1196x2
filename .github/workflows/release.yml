name: Release

on:
  workflow_dispatch:
  release:
    types: [ released ]

permissions:
  contents: read

jobs:
  extract-code-version:
    name: Extract code version
    runs-on: ubuntu-latest
    outputs:
      code-version: ${{ steps.extract.outputs.CODE_VERSION }}
    steps:
      - uses: actions/checkout@v6
      - id: extract
        name: Extract code version from gradle.properties
        run: echo "CODE_VERSION=$(awk -F= '$1~/version/{print $2}' gradle.properties)" >> $GITHUB_OUTPUT

  publish-to-sonatype:
    name: Publish to sonatype.org
    needs: [ extract-code-version ]
    if: github.repository_owner == 'eu-digital-identity-wallet' && startsWith(github.ref, 'refs/tags') && format('v{0}', needs.extract-code-version.outputs.code-version) == github.ref_name
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v6
      - name: Publish with Gradle
        env:
          CI: true
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.OSSRH_GPG_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.OSSRH_GPG_SECRET_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.OSSRH_GPG_PASSPHRASE }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.OSSRH_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.OSSRH_PASSWORD }}
        run: ./gradlew publishAllPublicationsToMavenCentral --full-stacktrace

  publish-xcframework:
    name: Publish xcframework
    needs: [ extract-code-version ]
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout the repo with tags
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v6

      - name: Find Artifact Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ github.ref_name }}

      - name: Build XCFramework
        run: ./gradlew kmmBridgePublish -PENABLE_PUBLISHING=true -PNATIVE_BUILD_TYPE=RELEASE -PGITHUB_PUBLISH_TOKEN="${{ secrets.GITHUB_TOKEN }}" -PGITHUB_REPO="${{ github.repository }}" -PGITHUB_ARTIFACT_RELEASE_ID="${{ steps.release.outputs.id }}" --no-daemon --info --stacktrace

      - name: Update release tag
        uses: touchlab/ga-update-release-tag@v1
        id: update-release-tag
        with:
          commitMessage: "KMP SPM package release for ${{ github.ref_name }}"
          tagMessage: "KMP release version v${{ github.ref_name }}"
          tagVersion: ${{github.ref_name}}-SPM
