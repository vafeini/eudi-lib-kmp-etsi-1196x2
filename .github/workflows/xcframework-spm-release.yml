name: Test XCFramework Package

on:
  workflow_dispatch:

jobs:
  test-xcframework-package:
    runs-on: macos-latest

    env:
      MODULE_NAME: etsi-119602-consultation
      FRAMEWORK_NAME: EudiEtsi1196x2
      PACKAGE_NAME: EudiEtsi1196x2
      ZIP_NAME: EudiEtsi1196x2.xcframework.zip
      VERSION: v0.0.0-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build XCFramework
        run: ./gradlew :${MODULE_NAME}:assemble${FRAMEWORK_NAME}ReleaseXCFramework

      - name: Zip XCFramework
        run: |
          cd ${MODULE_NAME}/build/XCFrameworks/release

          ditto -c -k --sequesterRsrc --keepParent \
            ${FRAMEWORK_NAME}.xcframework \
            ${ZIP_NAME}

      - name: Compute checksum
        id: checksum
        run: |
          CHECKSUM=$(swift package compute-checksum ${MODULE_NAME}/build/XCFrameworks/release/${ZIP_NAME})
          echo "checksum=$CHECKSUM" >> "$GITHUB_OUTPUT"
          echo "Checksum: $CHECKSUM"

      - name: Generate Package.swift
        run: |
          cat > Package.swift <<EOF
          // swift-tools-version: 5.9
          import PackageDescription

          let package = Package(
              name: "${PACKAGE_NAME}",
              platforms: [
                  .iOS(.v13)
              ],
              products: [
                  .library(
                      name: "${PACKAGE_NAME}",
                      targets: ["${FRAMEWORK_NAME}"]
                  )
              ],
              targets: [
                  .binaryTarget(
                      name: "${FRAMEWORK_NAME}",
                      url: "https://github.com/${{ github.repository }}/releases/download/${VERSION}/${ZIP_NAME}",
                      checksum: "${{ steps.checksum.outputs.checksum }}"
                  )
              ]
          )
          EOF

          cat Package.swift

      - name: Upload XCFramework zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.MODULE_NAME }}/build/XCFrameworks/release/${{ env.ZIP_NAME }}

      - name: Upload Package.swift artifact
        uses: actions/upload-artifact@v4
        with:
          name: Package.swift
          path: Package.swift